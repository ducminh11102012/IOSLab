name: Build and Release iOSLab Platform (Unsigned)

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v3.0.0)

jobs:
  build-and-release:
    name: Build and Publish Unsigned Release
    runs-on: macos-14 # Runs on Apple Silicon macos runner to support native Xcode builds
    permissions:
      contents: write # Explicitly grant write access to push the release assets

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==========================================
      # 1. SETUP ENVIRONMENT & NODE
      # ==========================================
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            cli/package-lock.json

      # ==========================================
      # 2. BUILD NATIVE MACOS APP (UNSIGNED)
      # ==========================================
      - name: Build and Archive Xcode Dashboard App (Unsigned)
        run: |
          # Build and archive native macOS app bypassing Apple certificates (Developer bypass)
          xcodebuild archive \
            -project macos-app/IOSLabDashboard.xcodeproj \
            -scheme IOSLabDashboard \
            -configuration Release \
            -archivePath $RUNNER_TEMP/IOSLabDashboard.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS=""

      - name: Export and Package App Bundle (Unsigned)
        run: |
          # Create temporary folder for un-signed app export
          mkdir -p $RUNNER_TEMP/export
          cp -r $RUNNER_TEMP/IOSLabDashboard.xcarchive/Products/Applications/IOSLabDashboard.app $RUNNER_TEMP/export/

          # Zip the final native App bundle (Users can disable macOS Gatekeeper to execute)
          cd $RUNNER_TEMP/export
          zip -r $RUNNER_TEMP/IOSLabDashboard.app.zip IOSLabDashboard.app

      # ==========================================
      # 3. COMPILE & BUNDLE BACKEND AND CLI
      # ==========================================
      - name: Install Dependencies and Compile Backend & CLI
        run: |
          # Build Backend Server
          cd backend
          npm install
          npm run build
          cd ..

          # Build CLI binary packages
          cd cli
          npm install
          npm run build
          cd ..

          # Package and zip CLI and backend release artifacts
          mkdir -p release-assets
          cp -r backend release-assets/backend-dist
          cp -r cli release-assets/cli-dist
          zip -r release-assets/ioslab-backend.zip release-assets/backend-dist
          zip -r release-assets/ioslab-cli.zip release-assets/cli-dist

      # ==========================================
      # 4. CREATE AND PUBLISH GITHUB RELEASE
      # ==========================================
      - name: Publish Artifacts to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ runner.temp }}/export/IOSLabDashboard.app.zip
            release-assets/ioslab-backend.zip
            release-assets/ioslab-cli.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
