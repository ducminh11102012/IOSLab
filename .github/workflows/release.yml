name: Build and Release iOSLab Platform (Unsigned)

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v3.0.0)
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Version of the release to publish (e.g., 3.0.0)'
        required: true
        default: '3.0.0'
      tag_name:
        description: 'Git Tag Name to build / associate (e.g., v3.0.0)'
        required: true
        default: 'v3.0.0'

jobs:
  build-and-release:
    name: Build and Publish Unsigned Release
    runs-on: macos-latest # Runs on modern macos runner to support native Xcode builds
    permissions:
      contents: write # Explicitly grant write access to push the release assets and tags

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==========================================
      # 1. HANDLE DYNAMIC TAGGING (WORKFLOW_DISPATCH)
      # ==========================================
      - name: Verify or Create Git Tag
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: ${{ github.event.inputs.tag_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Set up Git identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Check if tag already exists in remote
          git fetch --tags
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Git tag '$TAG_NAME' already exists. Reusing existing tag for release build."
          else
            echo "Git tag '$TAG_NAME' does not exist. Creating and pushing new tag from current commit..."
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
          fi

      # ==========================================
      # 2. SETUP ENVIRONMENT & NODE
      # ==========================================
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            cli/package-lock.json

      # ==========================================
      # 3. CREATE RELEASE ASSETS DIRECTORY
      # ==========================================
      - name: Prepare Release Directory
        run: |
          mkdir -p release-assets

      # ==========================================
      # 4. BUILD NATIVE MACOS APP (UNSIGNED)
      # ==========================================
      - name: Build and Archive Xcode Dashboard App (Unsigned)
        run: |
          # Build and archive native macOS app bypassing Apple certificates (Developer bypass)
          xcodebuild archive \
            -project macos-app/IOSLabDashboard.xcodeproj \
            -scheme IOSLabDashboard \
            -configuration Release \
            -archivePath $RUNNER_TEMP/IOSLabDashboard.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ENTITLEMENTS=""

      - name: Export and Package App Bundle (Unsigned)
        run: |
          # Create temporary folder for un-signed app export
          mkdir -p $RUNNER_TEMP/export
          cp -r $RUNNER_TEMP/IOSLabDashboard.xcarchive/Products/Applications/IOSLabDashboard.app $RUNNER_TEMP/export/

          # Zip the final native App bundle directly into release-assets folder
          cd $RUNNER_TEMP/export
          zip -r $GITHUB_WORKSPACE/release-assets/IOSLabDashboard.app.zip IOSLabDashboard.app

      # ==========================================
      # 5. COMPILE & BUNDLE BACKEND AND CLI
      # ==========================================
      - name: Install Dependencies and Compile Backend & CLI
        run: |
          # Build Backend Server
          cd backend
          npm install
          npm run build
          cd ..

          # Build CLI binary packages
          cd cli
          npm install
          npm run build
          cd ..

          # Package and zip CLI and backend release artifacts
          cp -r backend release-assets/backend-dist
          cp -r cli release-assets/cli-dist
          cd release-assets
          zip -r ioslab-backend.zip backend-dist
          zip -r ioslab-cli.zip cli-dist
          cd ..

      # ==========================================
      # 6. CREATE AND PUBLISH GITHUB RELEASE
      # ==========================================
      - name: Determine Release Target Tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
            echo "name=Release ${{ github.event.inputs.release_version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "name=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish Artifacts to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.name }}
          files: |
            release-assets/IOSLabDashboard.app.zip
            release-assets/ioslab-backend.zip
            release-assets/ioslab-cli.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
