name: ioslab-release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IOSLAB_SIMULATOR_MOCK: ${{ vars.IOSLAB_SIMULATOR_MOCK || 'false' }}

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            cli/package-lock.json

      - name: Build backend
        run: |
          echo "[release] backend install"
          cd backend
          npm ci
          echo "[release] backend build"
          npm run build

      - name: Build CLI
        run: |
          echo "[release] cli install"
          cd cli
          npm ci
          echo "[release] cli build"
          npm run build

      - name: Build dashboard + package
        run: |
          echo "[release] dashboard package"
          ./scripts/build_release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ioslab-release-artifacts
          path: dist/*

      - name: Set release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=v2.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Create tag if not exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag v2.0.0 || true
          git push origin v2.0.0 || true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: dist/*
          generate_release_notes: true
